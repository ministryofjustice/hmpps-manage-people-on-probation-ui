name: Build and test node

on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Passed to setup-node action to specify where to source the version of node from"
        required: false
        type: string
        default: ".nvmrc"
      install_command:
        description: "The command used to install npm dependencies"
        required: false
        type: string
        default: "npm ci --no-audit"

permissions:
  contents: read

jobs:
  node-build:
    name: Run the node build 
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Use Node.js ${{ inputs.node_version_file }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: ${{ inputs.node_version_file }}
    - name: update npm
      shell: bash
      run: |
        sudo npm install -g npm@latest
    - name: restore cache
      id: restore-cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
      env: 
        cache-name: node-modules
      with:
        path: |
          ./node_modules
          ~/.cache/Cypress
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json', '!**/node_modules/**') }}
    - name: install dependencies
      if: steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: "${{ inputs.install_command }}"
    - name: build npm
      shell: bash
      run: |
        npm run build
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    - name: Linter check # Run linter after build because the integration test code depend on compiled typescript...
      shell: bash
      run: | 
        npm run lint
    - name: upload the artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with: 
        name: npm_build_artifacts
        path: |
          build/
          dist/
          assets/stylesheets/
    - name: save cache
      id: save-cache
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
      env: 
        cache-name: node-modules
      with:
        path: |
          ./node_modules
          ~/.cache/Cypress
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json', '!**/node_modules/**') }}