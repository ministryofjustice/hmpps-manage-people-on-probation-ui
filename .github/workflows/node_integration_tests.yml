name: Integration tests

on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Passed to setup-node action to specify where to source the version of node from"
        required: false
        type: string
        default: ".nvmrc"
      node_index:
        description: "1-based index of this parallel node"
        required: true
        type: number
      node_total:
        description: "Total number of parallel nodes"
        required: false
        type: number
        default: 1

permissions:
  contents: read

jobs:
  integration_test:
    name: Run integration tests (${{ inputs.node_index }}/${{ inputs.node_total }})
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ inputs.node_version_file }}
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node_version_file }}
    - name: Restore cache
      id: restore-cache
      uses: actions/cache/restore@v5
      env:
        cache-name: node-modules
      with:
        path: |
          ./node_modules
          ~/.cache/Cypress
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
    - name: Install dependencies
      if: steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run setup
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: npm_build_artifacts
        path: .
    - name: Download unit test artifacts
      uses: actions/download-artifact@v8
      with:
        name: npm_unit_test_artifacts
        path: test_results/
    - name: Run integration tests
      id: integration-tests
      shell: bash
      env:
        NODE_INDEX: ${{ inputs.node_index }}
        NODE_TOTAL: ${{ inputs.node_total }}
      run: |
        nohup npm run start-feature &
        until curl -sf http://localhost:3007/health > /dev/null; do sleep 1; done
        npm run int-test-parallel
    - name: Upload cypress coverage
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress_coverage_${{ inputs.node_index }}
        path: cypress_coverage/
        overwrite: true
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress_results_${{ inputs.node_index }}
        path: test_results/
        overwrite: true
    - name: Fail if tests failed
      if: ${{ steps.integration-tests.outcome == 'failure' }}
      uses: actions/github-script@v9
      with:
        script: |
          core.setFailed('Integration tests failed')

  write_report:
    name: Write coverage report (${{ inputs.node_index }}/${{ inputs.node_total }})
    needs: integration_test
    if: always()
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ inputs.node_version_file }}
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node_version_file }}
    - name: Restore cache
      id: restore-cache
      uses: actions/cache/restore@v5
      env:
        cache-name: node-modules
      with:
        path: |
          ./node_modules
          ~/.cache/Cypress
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
    - name: Install dependencies
      if: steps.restore-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run setup
    - name: Download unit test artifacts
      uses: actions/download-artifact@v8
      with:
        name: npm_unit_test_artifacts
        path: test_results/
    - name: Download cypress coverage
      uses: actions/download-artifact@v8
      with:
        name: cypress_coverage_${{ inputs.node_index }}
        path: cypress_coverage/
    - name: Merge unit and integration test coverage reports
      shell: bash
      run: npm run coverage-report
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v7
      with:
        name: coverage_artifacts_${{ inputs.node_index }}
        path: coverage/
        overwrite: true