name: Sonarqube
on:
  workflow_call:
jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: download the coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage_artifacts_*
          merge-multiple: false
          path: coverage-artifacts/
      - name: merge lcov reports
        run: |
          mkdir -p coverage
          find coverage-artifacts -name 'lcov.info' -exec cat {} \; > coverage/lcov.info
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: '-Dproject.settings=./sonar-project.properties'