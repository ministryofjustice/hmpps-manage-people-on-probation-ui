---
# Per environment values which override defaults in hmpps-manage-people-on-probation-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: manage-people-on-probation-dev.hmpps.service.justice.gov.uk
    className: modsec-non-prod
    modsecurity_snippet: |
      SecRuleEngine On
      SecAuditEngine On
      SecAuditLog /var/log/nginx/error.log
      SecAuditLogType Serial
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-manage-people-on-probation,tag:namespace=hmpps-manage-people-on-probation-dev"
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecAction \
        "id:900000,\
         phase:1,\
         nolog,\
         pass,\
         t:none,\
         setvar:tx.paranoia_level=2"

      SecRule REQUEST_URI "@rx ^/case/[^/]+/(?:appointments/appointment/[^/]+/add-note|personal-details/edit-main-address)$" \
        "id:100101,phase:1,pass,nolog,\
        ctl:ruleRemoveTargetByTag=attack-rce;ARGS:notes,\
        ctl:ruleRemoveTargetById=930120;ARGS:notes,\
        ctl:ruleRemoveTargetById=942430;ARGS:notes,\
        ctl:ruleRemoveTargetById=942200;ARGS:notes,\
        ctl:ruleRemoveTargetById=942360;ARGS:notes,\
        ctl:ruleRemoveTargetById=942131;ARGS:notes,\
        ctl:ruleRemoveTargetById=942190;ARGS:notes,\
        ctl:ruleRemoveTargetById=942350;ARGS:notes,\
        ctl:ruleRemoveTargetById=942370;ARGS:notes"

      SecRule REQUEST_FILENAME "@rx ^/case/[^/]+/(?:arrange-appointment/[^/]+/(?:add-note|supporting-information)|appointments/[^/]+/check-in/(?:review/(?:expired|identity|notes)|view|view-expired))$" \
        "id:100102,phase:1,pass,nolog,\
        ctl:ruleRemoveTargetByTag=attack-rce;ARGS,\
        ctl:ruleRemoveTargetById=942430;ARGS,\
        ctl:ruleRemoveTargetById=942200;ARGS,\
        ctl:ruleRemoveTargetById=942360;ARGS,\
        ctl:ruleRemoveTargetById=942131;ARGS,\
        ctl:ruleRemoveTargetById=942190;ARGS,\
        ctl:ruleRemoveTargetById=942350;ARGS,\
        ctl:ruleRemoveTargetById=942370;ARGS"

      SecRule REQUEST_METHOD "@streq POST" \
      "id:100103,phase:1,pass,nolog,chain"
      SecRule REQUEST_URI "@rx ^/case/[^/]+/appointments/appointment/[^/]+/outcome/add-note$" \
        "ctl:ruleRemoveTargetByTag=attack-rce;ARGS,\
          ctl:ruleRemoveTargetById=930120;ARGS,\
          ctl:ruleRemoveTargetById=932230;ARGS,\
          ctl:ruleRemoveTargetById=932235;ARGS,\
          ctl:ruleRemoveTargetById=932250;ARGS,\
          ctl:ruleRemoveTargetById=942430;ARGS,\
          ctl:ruleRemoveTargetById=942200;ARGS,\
          ctl:ruleRemoveTargetById=942360;ARGS,\
          ctl:ruleRemoveTargetById=942131;ARGS,\
          ctl:ruleRemoveTargetById=942190;ARGS,\
          ctl:ruleRemoveTargetById=942350;ARGS,\
          ctl:ruleRemoveTargetById=942370;ARGS"

  env:
    INGRESS_URL: 'https://manage-people-on-probation-dev.hmpps.service.justice.gov.uk'
    HMPPS_AUTH_URL: 'https://sign-in-dev.hmpps.service.justice.gov.uk/auth'
    MANAGE_USERS_API_URL: 'https://manage-users-api-dev.hmpps.service.justice.gov.uk'
    TOKEN_VERIFICATION_API_URL: 'https://token-verification-api-dev.prison.service.justice.gov.uk'
    MAS_API_URL: 'https://manage-supervision-and-delius-dev.hmpps.service.justice.gov.uk'
    DELIUS_API_URL: 'https://manage-people-on-probation-and-delius-dev.hmpps.service.justice.gov.uk'
    ARNS_API_URL: 'https://assess-risks-and-needs-dev.hmpps.service.justice.gov.uk'
    TIER_API_URL: 'https://hmpps-tier-dev.hmpps.service.justice.gov.uk'
    INTERVENTIONS_API_URL: 'https://hmpps-interventions-service-dev.apps.live-1.cloud-platform.service.justice.gov.uk'
    SUPERVISION_API_URL: 'https://probation-supervision-appointments-api-dev.hmpps.service.justice.gov.uk'
    ARNS_ASSESSMENT_PLATFORM_API_URL: 'https://arns-assessment-platform-api-dev.hmpps.service.justice.gov.uk'
    PROBATION_FRONTEND_COMPONENTS_API_URL: 'https://probation-frontend-components-dev.hmpps.service.justice.gov.uk'
    PROBATION_FRONTEND_COMPONENTS_CONNECT_SRC: 'https://probation-frontend-components-dev.hmpps.service.justice.gov.uk'
    PROBATION_FRONTEND_COMPONENTS_FONT_SRC: 'https://probation-frontend-components-dev.hmpps.service.justice.gov.uk'
    FLIPT_URL: 'https://feature-flags-manage-people-on-probation-dev.hmpps.service.justice.gov.uk'
    INTERVENTIONS_LINK: 'https://hmpps-interventions-ui-dev.apps.live-1.cloud-platform.service.justice.gov.uk'
    SUPERVISION_CONTACTS_LINK: 'https://probation-supervision-contacts-ui-dev.hmpps.service.justice.gov.uk'
    DELIUS_LINK: 'https://ndelius.test.probation.service.justice.gov.uk'
    OASYS_LINK: 'https://t2.oasys.service.justice.gov.uk'
    RECALL_LINK: 'https://consider-a-recall-dev.hmpps.service.justice.gov.uk/'
    CAS1_LINK: 'https://approved-premises-dev.hmpps.service.justice.gov.uk/'
    CAS3_LINK: 'https://transitional-accommodation-dev.hmpps.service.justice.gov.uk/referrals'
    CAVAL_LINK: 'https://create-and-vary-a-licence-dev.hmpps.service.justice.gov.uk'
    EPF2_LINK: '/'
    TIER_LINK: 'https://tier-dev.hmpps.service.justice.gov.uk/case'
    TIER_URL: 'https://tier-dev.hmpps.service.justice.gov.uk'
    SENTENCE_PLAN_LINK: 'https://sentence-plan-dev.hmpps.service.justice.gov.uk'
    SENTENCE_PLAN_LINK_V2: 'https://arns-assessment-platform-dev.hmpps.service.justice.gov.uk/access/sentence-plan/crn'
    E_SUPERVISION_API_URL: 'https://esupervision-api-dev.hmpps.service.justice.gov.uk'
    EMDI_API_URL: 'https://electronic-monitoring-data-insights-api-dev.hmpps.service.justice.gov.uk'
    ESUPERVISION_GUIDANCE_LINK: 'https://probation-check-in-dev.hmpps.service.justice.gov.uk'
    CHAR_COUNT: 12000
    ENVIRONMENT_NAME: DEV
    ENVIRONMENT: dev

  allowlist:
    groups:
      - digital_staff_and_mojo
      - unilink_staff
      - moj_cloud_platform
      - accessibility-testing-1
    kpmg-pen-1: 195.68.59.72/29

  scheduledDowntime:
    enabled: true

generic-prometheus-alerts:
  alertSeverity: manage-people-on-probation-dev
