SecRuleEngine On
SecAuditEngine On
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogType Serial

SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"

SecRule REQUEST_FILENAME "@rx ^/case/[^/]+/(?:appointments/appointment/[^/]+/add-note|personal-details/edit-main-address)$" \
  "id:100101,phase:1,pass,nolog,\
  ctl:ruleRemoveTargetByTag=attack-rce;ARGS:notes,\
  ctl:ruleRemoveTargetByTag=attack-lfi;ARGS:notes,\
  ctl:ruleRemoveTargetByTag=attack-xss;ARGS:notes,\
  ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:notes"

SecRule REQUEST_FILENAME "@rx ^/case/[^/]+/(?:arrange-appointment/[^/]+/(?:add-note|supporting-information|outcome/add-note)|appointments/[^/]+/check-in/(?:review/(?:expired|identity|notes)|view|view-expired))$" \
  "id:100102,phase:1,pass,nolog,\
  ctl:ruleRemoveTargetByTag=attack-rce;ARGS,\
  ctl:ruleRemoveTargetByTag=attack-lfi;ARGS,\
  ctl:ruleRemoveTargetByTag=attack-xss;ARGS,\
  ctl:ruleRemoveTargetByTag=attack-sqli;ARGS"

SecRule REQUEST_METHOD "@streq POST" "id:100103,phase:1,pass,nolog,chain"
  SecRule REQUEST_FILENAME "@rx ^/case/[^/]+/appointments/appointment/[^/]+/outcome/add-note$" \
    "ctl:ruleRemoveTargetByTag=attack-rce;ARGS,\
    ctl:ruleRemoveTargetByTag=attack-lfi;ARGS,\
    ctl:ruleRemoveTargetByTag=attack-xss;ARGS,\
    ctl:ruleRemoveTargetByTag=attack-sqli;ARGS"
